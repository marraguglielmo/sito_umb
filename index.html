<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umberto: Dublin Bound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace, sans-serif;
            overflow: hidden;
            /* Impedisce lo scroll accidentale su mobile */
            touch-action: none;
        }
        
        canvas {
            background-color: #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            border-radius: 4px;
        }

        #info {
            position: absolute;
            top: 15px;
            font-family: sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            color: #666;
            text-transform: uppercase;
            z-index: 10;
        }

        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            padding: 0 25px;
            box-sizing: border-box;
            justify-content: space-between;
            z-index: 10;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 10px;
        }

        .dpad-btn, .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 850px) {
            #mobile-controls { display: flex; }
            #info { display: none; }
        }
    </style>
</head>
<body onclick="startAudio()">

<div id="info">Tocca per iniziare e usa WASD o Frecce per muoverti</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<div id="mobile-controls">
    <div class="dpad">
        <div></div><div class="dpad-btn" id="btn-up">↑</div><div></div>
        <div class="dpad-btn" id="btn-left">←</div><div></div><div class="dpad-btn" id="btn-right">→</div>
        <div></div><div class="dpad-btn" id="btn-down">↓</div><div></div>
    </div>
    <div class="action-btn" id="btn-action">TALK</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // AUDIO SYSTEM
    let bgMusic = new Audio('assets/audio/umb_gay.mp3');
    bgMusic.loop = true;
    let audioStarted = false;

    function startAudio() {
        if (!audioStarted) {
            bgMusic.play().catch(e => console.log("Audio in attesa di interazione"));
            audioStarted = true;
            document.getElementById('info').innerText = "Esplora la città prima della partenza";
        }
    }

    const MAP_WIDTH = 1600;
    const MAP_HEIGHT = 1200;
    const camera = { x: 0, y: 0, w: canvas.width, h: canvas.height };

    let gameState = 'PLAY'; 
    let identity = 0; 
    const talkedTo = new Set();
    let currentDialog = null;
    let dialogChars = 0;
    let endImageLoaded = false;
    const endImage = new Image();

    function drawImageCover(ctx, img, x, y, w, h) {
        if (!img.complete) return;
        const imgRatio = img.width / img.height;
        const targetRatio = w / h;
        let sw, sh, sx, sy;
        if (imgRatio > targetRatio) {
            sh = img.height; sw = img.height * targetRatio;
            sx = (img.width - sw) / 2; sy = 0;
        } else {
            sw = img.width; sh = img.width / targetRatio;
            sx = 0; sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    const keys = {};
    window.addEventListener('keydown', e => { 
        keys[e.key.toLowerCase()] = true; 
        if(e.key===' ') { e.preventDefault(); handleInteraction(); } 
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    const bindT = (id, k, act=false) => {
        const b = document.getElementById(id);
        b.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            startAudio(); 
            keys[k]=true; 
            if(act) handleInteraction(); 
        });
        b.addEventListener('touchend', (e) => { e.preventDefault(); keys[k]=false; });
    };
    bindT('btn-up','w'); bindT('btn-left','a'); bindT('btn-down','s'); bindT('btn-right','d'); bindT('btn-action',' ',true);

    const roads = [
        { x: 0, y: 450, w: MAP_WIDTH, h: 100, color: '#3d3d3d' }, 
        { x: 700, y: 0, w: 120, h: MAP_HEIGHT, color: '#3d3d3d' }
    ];

    const obstacles = [
        { x: 100, y: 100, w: 300, h: 220, color: '#5d3b2a', label: 'Clandestino 13' },
        { x: 850, y: 80, w: 220, h: 200, color: '#7a2d2d', label: 'Bar cappuccini' },
        { x: 1250, y: 150, w: 280, h: 180, color: '#2d4a3e', label: 'Brujita' },
        { x: 150, y: 700, w: 400, h: 250, color: '#4a4a4a', label: 'Biblioteca' },
        { x: 1100, y: 750, w: 420, h: 300, color: '#2b3d52', label: 'Stadio san vito' },
        { x: 750, y: 900, w: 250, h: 200, color: '#3e4a59', label: 'ecotekne' }
    ];

    const player = { x: 740, y: 480, w: 32, h: 42, speed: 3.5, color: '#1a2a40', hair: '#4a4a4a', suitcase: '#3d2b1f' };

    const npcs = [
        { id: 1, name: "Cece", role: "Cece", text: "Dovevi aspettarmi bastardo.", x: 420, y: 350, color: '#4a5d23', imgUrl: 'assets/img/cece.jpeg', img: new Image() },
        { id: 2, name: "Aniceto", role: "Rachitico", text: "Ancora quai stai?? Essi o te scannu.", x: 650, y: 310, color: '#5d4a3a', imgUrl: 'assets/img/aniceto.jpeg', img: new Image() },
        { id: 3, name: "Bubi", role: "Chill guy", text: "Come sta Asia? ….va mori …ammazzati ...sei un pagliaccio ... non ti vergnogni?", x: 1210, y: 350, color: '#2a3d4a', imgUrl: 'assets/img/bubi.jpg', img: new Image() },
        { id: 4, name: "Gugli", role: "Quasi pelato", text: "Mercoledì in pist... ah no, va fatica.", x: 570, y: 720, color: '#4a2a2a', imgUrl: 'assets/img/gugli.jpg', img: new Image() },
        { id: 5, name: "Ric", role: "Stempiato", text: "Ti aspetto per l’ironman! 😉💪🏽\n#HybridAthlete #NoPainNoGain", x: 1040, y: 800, color: '#2a4a2a', imgUrl: 'assets/img/ric.jpeg', img: new Image() },
        { id: 6, name: "Pietro", role: "Pelato", text: "Meh? Quanti esami ti mancano?", x: 640, y: 920, color: '#3d3d3d', imgUrl: 'assets/img/pietro.jpeg', img: new Image() },
        { id: 7, name: "Trande", role: "Scasciatu", text: "Sirda tene puru fii normali?", x: 1030, y: 950, color: '#1a3c34', imgUrl: 'assets/img/tonio.jpeg', img: new Image() }
    ];
    npcs.forEach(n => { n.img.src=n.imgUrl; });

    const rain = [];
    for(let i=0; i<200; i++) rain.push({ x: Math.random()*MAP_WIDTH, y: Math.random()*MAP_HEIGHT, v: 8+Math.random()*4 });

    function checkCollision(nx, ny) {
        if (nx < 0 || ny < 0 || nx + 32 > MAP_WIDTH || ny + 42 > MAP_HEIGHT) return true;
        for (let o of obstacles) if (nx < o.x + o.w && nx + 32 > o.x && ny < o.y + o.h && ny + 42 > o.y) return true;
        for (let n of npcs) if (nx < n.x + 32 && nx + 32 > n.x && ny < n.y + 42 && ny + 42 > n.y) return true;
        return false;
    }

    // Aggiungi questa variabile all'inizio con le altre (es. sotto let identity = 0)
    let endShown = false; 

    function handleInteraction() {
        startAudio(); 
        
        // Se siamo nella schermata finale, premendo TALK torniamo a giocare
        if (gameState === 'END') {
            gameState = 'PLAY';
            endShown = true; // Segnamo che l'abbiamo già vista per non farla loopare
            return;
        }

        if (gameState === 'DIALOG') {
            if (dialogChars >= currentDialog.text.length) { 
                gameState = 'PLAY'; 
                // Attiva la schermata finale solo se non l'abbiamo ancora chiusa
                if (talkedTo.size >= npcs.length && !endShown) handleGameCompletion();
            } else dialogChars = currentDialog.text.length;
            return;
        }

        npcs.forEach(n => {
            let d = Math.hypot(player.x - n.x, player.y - n.y);
            if (d < 65) {
                gameState = 'DIALOG'; currentDialog = n; dialogChars = 0;
                if (!talkedTo.has(n.id)) { 
                    talkedTo.add(n.id); 
                    identity = (talkedTo.size/npcs.length)*100; 
                }
            }
        });
    }

    function handleGameCompletion() {
        gameState = 'END';
        endImage.src = 'assets/img/umb.png';
        endImage.onload = () => { endImageLoaded = true; };
    }

    function update() {
        if (gameState === 'PLAY') {
            let dx=0, dy=0;
            if (keys['w']||keys['arrowup']) dy = -player.speed;
            if (keys['s']||keys['arrowdown']) dy = player.speed;
            if (keys['a']||keys['arrowleft']) dx = -player.speed;
            if (keys['d']||keys['arrowright']) dx = player.speed;
            
            if(dx!==0 || dy!==0) {
                if(!checkCollision(player.x + dx, player.y)) player.x += dx;
                if(!checkCollision(player.x, player.y + dy)) player.y += dy;
            }
            camera.x = player.x - camera.w/2;
            camera.y = player.y - camera.h/2;
            camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH - camera.w));
            camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT - camera.h));
        }
        if (gameState === 'DIALOG' && dialogChars < currentDialog.text.length) dialogChars += 0.8;
    }

    function drawChar(x, y, color, hair, suitcase, isPlayer) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath(); ctx.ellipse(x+16, y+40, 12, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#222'; ctx.fillRect(x+8, y+30, 6, 12); ctx.fillRect(x+18, y+30, 6, 12);
        ctx.fillStyle = color; ctx.fillRect(x+4, y+12, 24, 22);
        ctx.fillStyle = '#efd0b1'; ctx.fillRect(x+8, y, 16, 16);
        ctx.fillStyle = hair; ctx.fillRect(x+8, y, 16, 4);
        if(isPlayer) { ctx.fillStyle = suitcase; ctx.fillRect(x+26, y+24, 10, 14); ctx.fillStyle='#111'; ctx.fillRect(x+28, y+22, 6, 2); }
        ctx.fillStyle = '#333'; ctx.fillRect(x+10, y+6, 3, 3); ctx.fillRect(x+19, y+6, 3, 3);
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        if (gameState !== 'END') {
            ctx.save(); ctx.translate(-camera.x, -camera.y);

            ctx.fillStyle = '#2a2a2a'; ctx.fillRect(0,0,MAP_WIDTH,MAP_HEIGHT);
            ctx.strokeStyle = '#333'; ctx.lineWidth=1;
            for(let i=0; i<MAP_WIDTH; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,MAP_HEIGHT); ctx.stroke(); }

            roads.forEach(r => { ctx.fillStyle=r.color; ctx.fillRect(r.x,r.y,r.w,r.h); });

            obstacles.forEach(o => {
                ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(o.x, o.y+o.h-10, o.w, 10);
                ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
                ctx.fillText(o.label, o.x+15, o.y+30);
            });

            npcs.forEach(n => drawChar(n.x, n.y, n.color, '#333', '', false));
            drawChar(player.x, player.y, player.color, player.hair, player.suitcase, true);

            ctx.strokeStyle = 'rgba(200,200,255,0.2)'; ctx.lineWidth=1;
            rain.forEach(r => {
                ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x-1, r.y+5); ctx.stroke();
                r.y += r.v; r.x -= 0.5;
                if(r.y > MAP_HEIGHT) { r.y = -10; r.x = Math.random()*MAP_WIDTH; }
            });

            ctx.restore();

            // UI BARRA
            ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(20, 20, 200, 6);
            ctx.fillStyle = '#fff'; ctx.fillRect(20, 20, (identity/100)*200, 6);
            ctx.font = '8px "Press Start 2P"'; ctx.fillText(`Progressi: ${Math.round(identity)}%`, 20, 42);

            // DIALOGHI - LOGICA WRAP SICURA PER MOBILE
            if (gameState === 'DIALOG') {
                ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(50, 410, 700, 160);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(50, 410, 700, 160);
                
                if(currentDialog.img.complete) drawImageCover(ctx, currentDialog.img, 70, 430, 120, 120);
                
                ctx.fillStyle = '#aaa'; ctx.font = '10px "Press Start 2P"'; 
                ctx.fillText(currentDialog.name + " (" + currentDialog.role + ")", 210, 440);
                
                ctx.fillStyle = '#fff'; ctx.font = '11px "Press Start 2P"';
                
                // --- NUOVA LOGICA DI WRAP SICURA ---
                let fullTxt = currentDialog.text.substring(0, Math.floor(dialogChars));
                let paragraphs = fullTxt.split('\n');
                let yy = 475;
                const maxLineW = 26; // Caratteri per riga sicuri

                paragraphs.forEach(p => {
                    let words = p.split(' ');
                    let line = '';
                    for(let i=0; i<words.length; i++) {
                        let testLine = line + words[i] + ' ';
                        if (testLine.length > maxLineW && i > 0) {
                            ctx.fillText(line, 210, yy);
                            line = words[i] + ' ';
                            yy += 22;
                        } else {
                            line = testLine;
                        }
                    }
                    ctx.fillText(line, 210, yy);
                    yy += 22;
                });
            }
        } else {
            // SCHERMATA FINALE
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,800,600);
            if (endImageLoaded) {
                ctx.strokeStyle = '#c5a059'; ctx.lineWidth = 4;
                ctx.strokeRect(200, 50, 400, 350);
                drawImageCover(ctx, endImage, 200, 50, 400, 350);
            }
            ctx.textAlign='center';
            ctx.fillStyle='#fff'; ctx.font='16px "Press Start 2P"';
            ctx.fillText("Alla fine l'ha fatta", 400, 440);
            ctx.fillText("cu te laurei ah...", 400, 470);
            ctx.fillStyle='#c5a059'; ctx.font='10px "Press Start 2P"';
            ctx.fillText("Se campamu non accetta falliti,", 400, 520);
            ctx.fillText("quindi torna fallito ☘️✈️", 400, 545);
            ctx.textAlign='left';
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
